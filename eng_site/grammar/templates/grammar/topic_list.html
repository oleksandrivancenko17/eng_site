{% extends 'base.html' %}
{% load static %}

{% block title %}Граматика - EngLearn{% endblock %}

{% block content %}
<div class="container mb-5 mt-4">

    <div class="row mb-4 align-items-center">
        <div class="col-md-8">
            <h2 class="fw-bold mb-2">Тести з граматики</h2>
            <p class="text-muted">Обери тему, щоб перевірити свої знання та закріпити правила на практиці.</p>
        </div>
        <div class="col-md-4 text-md-end">
            <select id="level-filter" class="form-select w-auto d-inline-block shadow-sm">
                <option value="all" selected>Всі рівні</option>
                <option value="A">Початковий (A1-A2)</option>
                <option value="B">Середній (B1-B2)</option>
                <option value="C">Просунутий (C1-C2)</option>
            </select>
        </div>
    </div>

    <div class="row g-4" id="topics-container">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="text-muted mt-3">Завантаження тем...</p>
        </div>
    </div>

</div>
{% endblock %}

{% block extra_js %}
    <script src="{% static 'js/grammar.js' %}"></script>
{% endblock %}
