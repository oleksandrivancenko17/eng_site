{% extends 'base.html' %}

{% block title %}Вхід - EngLearn{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="card w-100 border-0"
             style="max-width: 400px; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);">
            <div class="card-body p-4 p-sm-5">
                <h3 class="text-center mb-4 fw-bold text-primary">EngLearn</h3>
                <h5 class="text-center mb-4">Вхід в акаунт</h5>

                <form method="POST">
                    {% csrf_token %}

                    {% if form.errors %}
                        <div class="alert alert-danger py-2">Неправильний логін або пароль.</div>
                    {% endif %}

                    <div class="mb-3">
                        <label for="id_username"
                               class="form-label text-muted small fw-bold text-uppercase">Логін</label>
                        <input type="text" name="username" class="form-control form-control-lg" id="id_username"
                               placeholder="Введіть логін" required>
                    </div>

                    <div class="mb-4">
                        <label for="id_password"
                               class="form-label text-muted small fw-bold text-uppercase">Пароль</label>
                        <input type="password" name="password" class="form-control form-control-lg" id="id_password"
                               placeholder="••••••••" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold">Увійти</button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <small class="text-muted">Немає акаунту? <a href="{% url 'users:register' %}"
                                                                class="text-decoration-none fw-bold">Зареєструватися</a></small>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
