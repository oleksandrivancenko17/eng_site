{% extends 'base.html' %}
{% load static %}

{% block title %}Вхід - EngLearn{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="card w-100 border-0"
             style="max-width: 400px; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);">
            <div class="card-body p-4 p-sm-5">
                <h3 class="text-center mb-4 fw-bold text-primary">EngLearn</h3>
                <h5 class="text-center mb-4">Вхід в акаунт</h5>

                <form id="login-form">
                    <!-- Блок для помилок від API -->
                    <div id="login-errors" class="alert alert-danger py-2 d-none"></div>

                    <div class="mb-3">
                        <label for="username"
                               class="form-label text-muted small fw-bold text-uppercase">Логін</label>
                        <input type="text" name="username" class="form-control form-control-lg" id="username"
                               placeholder="Введіть логін" required>
                    </div>

                    <div class="mb-4">
                        <label for="password"
                               class="form-label text-muted small fw-bold text-uppercase">Пароль</label>
                        <input type="password" name="password" class="form-control form-control-lg" id="password"
                               placeholder="••••••••" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold" id="login-btn">Увійти</button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <small class="text-muted">Немає акаунту? <a href="/users/register/"
                                                                class="text-decoration-none fw-bold">Зареєструватися</a></small>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

{% block extra_js %}
    <script src="{% static 'js/users.js' %}"></script>
{% endblock %}
