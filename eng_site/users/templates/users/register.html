{% extends 'base.html' %}
{% load static %}

{% block title %}Реєстрація - EngLearn{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
    <div class="container d-flex align-items-center justify-content-center py-5" style="min-height: 100vh;">
        <div class="card w-100 border-0 shadow-sm" style="max-width: 450px; border-radius: 1rem;">
            <div class="card-body p-4 p-sm-5">
                <h3 class="text-center mb-4 fw-bold text-primary">EngLearn</h3>
                <h5 class="text-center mb-4">Створення акаунту</h5>

                <form id="register-form">
                    <!-- Глобальні помилки -->
                    <div id="register-errors" class="alert alert-danger py-2 d-none"></div>

                    <div class="mb-3">
                        <label for="username"
                               class="form-label text-muted small fw-bold text-uppercase">Логін</label>
                        <input type="text" name="username" class="form-control form-control-lg"
                               id="username" placeholder="Вигадай собі нікнейм" required>
                        <div class="invalid-feedback" id="error-username"></div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label text-muted small fw-bold text-uppercase">Email</label>
                        <input type="email" name="email" class="form-control form-control-lg"
                               id="email" placeholder="name@example.com" required>
                        <div class="invalid-feedback" id="error-email"></div>
                    </div>

                    <div class="mb-3">
                        <label for="password"
                               class="form-label text-muted small fw-bold text-uppercase">Пароль</label>
                        <input type="password" name="password" class="form-control form-control-lg"
                               id="password" placeholder="Мінімум 8 символів" required>
                        <div class="invalid-feedback" id="error-password"></div>
                    </div>

                    <div class="mb-4">
                        <label for="password_confirm" class="form-label text-muted small fw-bold text-uppercase">Підтвердження
                            пароля</label>
                        <input type="password" name="password_confirm" class="form-control form-control-lg"
                               id="password_confirm" placeholder="Повторіть пароль" required>
                        <div class="invalid-feedback" id="error-password_confirm"></div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-success btn-lg fw-bold" id="register-btn">Створити акаунт</button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <small class="text-muted">Вже є акаунт? <a href="/users/login/"
                                                               class="text-decoration-none fw-bold">Увійти</a></small>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

{% block extra_js %}
    <script src="{% static 'js/users.js' %}"></script>
{% endblock %}
